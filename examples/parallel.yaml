name: parallel_processing
description: Workflow with parallel branches using MessageSendParams structure.
config:
  api_keys: development
on_error: continue_branches
tasks:
  - id: fetch_data
    agent: demo-agent
    execution:
      timeout: 120
    task:
      message:
        messageId: msg-fetch-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Gather the latest repository metrics and dependency manifests needed for the project audit.
  - id: analyze_code
    agent: demo-agent
    depends_on:
      - fetch_data
    execution:
      timeout: 300
    task:
      message:
        messageId: msg-analyze-code-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Review the project dataset and enumerate code quality concerns.
  - id: analyze_docs
    agent: test-agent-2
    depends_on:
      - fetch_data
    execution:
      timeout: 240
      retry:
        attempts: 3
        backoff: exponential
        delay_seconds: 15
      permission: allow
    task:
      message:
        messageId: msg-analyze-docs-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Review the project dataset and highlight documentation gaps.
  - id: generate_report
    agent: demo-agent
    depends_on:
      - analyze_code
      - analyze_docs
    execution:
      timeout: 180
      permission: ask
    task:
      message:
        messageId: msg-report-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Merge the code and documentation findings into a single executive summary.
      metadata:
        audience: leadership
