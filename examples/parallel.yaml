name: parallel_processing
description: Workflow with parallel branches aligned to the A2A mapping.
config:
  api_keys: development
on_error: continue_branches
tasks:
  - id: fetch_data
    agent: demo-agent
    execution:
      timeout: 120
    task:
      contextId: project_audit
      history:
        - messageId: msg-fetch-1
          kind: message
          role: user
          parts:
            - kind: text
              text: |
                Gather the latest repository metrics and dependency manifests needed for the project audit.
      artifacts:
        - artifactId: project_dataset
          parts:
            - kind: text
              text: Raw project metrics will be attached here by the agent.
  - id: analyze_code
    agent: demo-agent
    depends_on:
      - fetch_data
    inputs:
      artifacts:
        - from: fetch_data
          artifactId: project_dataset
    execution:
      timeout: 300
    task:
      contextId: project_audit
      history:
        - messageId: msg-analyze-code-1
          kind: message
          role: user
          parts:
            - kind: text
              text: |
                Review the project dataset and enumerate code quality concerns.
      artifacts:
        - artifactId: code_review_summary
          parts:
            - kind: text
              text: The agent summarizes code analysis findings here.
  - id: analyze_docs
    agent: test-agent-2
    depends_on:
      - fetch_data
    inputs:
      artifacts:
        - from: fetch_data
          artifactId: project_dataset
    execution:
      timeout: 240
      retry:
        attempts: 3
        backoff: exponential
        delay_seconds: 15
    task:
      contextId: project_audit
      history:
        - messageId: msg-analyze-docs-1
          kind: message
          role: user
          parts:
            - kind: text
              text: |
                Review the project dataset and highlight documentation gaps.
      artifacts:
        - artifactId: docs_review_summary
          parts:
            - kind: text
              text: Documentation analysis notes go here.
  - id: generate_report
    agent: demo-agent
    depends_on:
      - analyze_code
      - analyze_docs
    inputs:
      artifacts:
        - from: analyze_code
          artifactId: code_review_summary
        - from: analyze_docs
          artifactId: docs_review_summary
    execution:
      timeout: 180
    task:
      contextId: project_audit
      metadata:
        audience: leadership
      history:
        - messageId: msg-report-1
          kind: message
          role: user
          parts:
            - kind: text
              text: |
                Merge the code and documentation findings into a single executive summary.
            - kind: text
              text: |
                Reference artifacts: code_review_summary, docs_review_summary.
      artifacts:
        - artifactId: audit_report
          parts:
            - kind: text
              text: Final audit report content generated by the agent.
