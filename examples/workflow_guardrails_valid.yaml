name: guardrails_valid
description: Valid workflow demonstrating proper DAG guardrails using MessageSendParams
config:
  api_keys: development
on_error: stop_all
tasks:
  - id: draft_welcome
    agent: demo-agent
    task:
      message:
        messageId: msg-draft-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Draft a welcome message for the project documentation.
  - id: summarize_plan
    agent: demo-agent
    depends_on:
      - draft_welcome
    task:
      message:
        messageId: msg-summarize-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Summarize the welcome note into a single sentence.
  - id: finalize_doc
    agent: demo-agent
    depends_on:
      - summarize_plan
    execution:
      permission: allow
    task:
      message:
        messageId: msg-finalize-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Finalize the documentation using the plan summary.
