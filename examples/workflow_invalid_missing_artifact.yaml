name: guardrails_missing_artifact
description: Invalid workflow with reference to non-existent dependency
config:
  api_keys: development
on_error: stop_all
tasks:
  - id: draft_welcome
    agent: demo-agent
    task:
      message:
        messageId: msg-draft-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Draft a welcome message.
  - id: summarize_plan
    agent: demo-agent
    depends_on:
      - nonexistent_task
    task:
      message:
        messageId: msg-summarize-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Summarize using the dependency (which doesn't exist).
