agents:
  # A2A agent for Rust worker testing (Phase 1)
  mock-agent:
    type: a2a
    config:
      url: "http://localhost:18765"

  # Simple stdio agent for Go worker testing
  mock-agent-stdio:
    type: stdio
    config:
      command: "uv"
      args: ["run", "mock-agent", "--mode", "stdio"]

  # Test agent with special marker for config integration tests (A2A for Rust Phase 1)
  test-config-agent:
    type: a2a
    config:
      url: "http://localhost:18766"  # Different port from main mock-agent

  # Example A2A agent configuration
  # orchestrator-remote:
  #   type: a2a
  #   config:
  #     url: "http://remote:9456/"
  #     timeout: 300

  # Example ACP agent configuration
  # gemini-cli:
  #   type: acp
  #   config:
  #     command: "gemini-cli"
  #     args: ["--api-key", "${GEMINI_API_KEY}", "--model", "gemini-2.0-flash-exp"]

  # ACP agents for integration testing
  test-acp-agent:
    type: acp
    config:
      command: "uv"
      args: ["run", "mock-agent", "--mode", "acp"]

  test-acp-agent-timeout:
    type: acp
    config:
      command: "uv"
      args: ["run", "mock-agent", "--mode", "acp", "--hang-initialize"]
      timeout: 2  # Short timeout for initialize timeout testing

  minimal-acp-agent:
    type: acp
    config:
      command: "uv"
      args: ["run", "mock-agent", "--mode", "acp"]

  full-acp-agent:
    type: acp
    config:
      command: "uv"
      args: ["run", "mock-agent", "--mode", "acp"]
      timeout: 60
      env:
        TEST_VAR: "test_value"

  invalid-acp-agent:
    type: acp
    config:
      command: ""
      args: []
