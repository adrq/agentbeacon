agents:
  # Simple stdio agent for testing
  mock-agent:
    type: stdio
    config:
      command: "uv"
      args: ["run", "mock-agent", "--mode", "stdio"]

  # Test agent with special marker for config integration tests
  test-config-agent:
    type: stdio
    config:
      command: "uv"
      args: ["run", "mock-agent", "--mode", "stdio", "--config", "test-config-responses.json"]

  # Example A2A agent configuration
