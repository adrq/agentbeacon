name: sequential_onboarding
description: Demonstrates a two-step sequential workflow aligned with the A2A MessageSendParams schema.
on_error: stop_all
config:
  environment: sandbox
tasks:
  - id: draft_welcome
    agent: mock-a2a-writer
    task:
      message:
        messageId: msg-draft-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Compose a short welcome message introducing AgentMaestro to a new teammate.
  - id: summarize_plan
    agent: mock-a2a-editor
    depends_on:
      - draft_welcome
    execution:
      timeout: 120
      retry:
        attempts: 2
        backoff: linear
        delay_seconds: 10
      permission: allow
    task:
      message:
        messageId: msg-summarize-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Review the welcome note and summarize the onboarding plan in two bullet points.
