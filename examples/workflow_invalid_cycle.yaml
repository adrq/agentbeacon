name: guardrails_cycle
description: Invalid workflow with circular dependencies (FR-002)
config:
  api_keys: development
on_error: stop_all
tasks:
  - id: task_a
    agent: demo-agent
    depends_on:
      - task_b
    task:
      message:
        messageId: msg-a-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Task A depends on Task B.
  - id: task_b
    agent: demo-agent
    depends_on:
      - task_c
    task:
      message:
        messageId: msg-b-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Task B depends on Task C.
  - id: task_c
    agent: demo-agent
    depends_on:
      - task_a
    task:
      message:
        messageId: msg-c-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Task C depends on Task A (creates cycle).
