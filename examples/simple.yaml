name: simple_pipeline
description: Basic sequential workflow aligned with the A2A MessageSendParams schema.
config:
  api_keys: development
on_error: stop_all
tasks:
  - id: analyze
    agent: demo-agent
    execution:
      timeout: 300
      permission: allow
    task:
      message:
        messageId: msg-analyze-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Analyze the codebase structure and identify key components.
      configuration:
        blocking: true
        historyLength: 5
      metadata:
        category: architecture
        example: test
        nested:
          value: 123
          array: [1, 2, 3]
          nullValue: null
  - id: summarize
    agent: demo-agent
    depends_on:
      - analyze
    execution:
      timeout: 180
      permission: ask
    task:
      message:
        messageId: msg-summarize-1
        kind: message
        role: user
        parts:
          - kind: text
            text: |
              Summarize the findings from the analysis notes in three bullet points.
      metadata:
        previousTask: analyze
