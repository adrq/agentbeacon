[project]
name = "agentmaestro"
version = "0.1.0"
description = "AI agent orchestrator"
requires-python = ">=3.10"

[dependency-groups]
dev = [
    "pre-commit>=3.5.0",
    "pytest>=7.0.0",
    "requests>=2.25.0",
    "psutil>=5.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agentmaestro"]
