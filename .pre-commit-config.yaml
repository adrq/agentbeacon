repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']  # Prevent files >1MB
      - id: check-merge-conflict
      - id: check-json
      - id: check-case-conflict  # Prevent case-sensitive filename conflicts
      - id: check-symlinks       # Check for broken symlinks

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo
        language: system
        args: [fmt, --all]
        files: \.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo
        language: system
        args: [clippy, --all-targets, --all-features, --, -D, warnings]
        files: \.rs$
        pass_filenames: false
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.1
    hooks:
      - id: ruff-check
        args: [ --fix, --show-fixes ]
      - id: ruff-format
